name: CI

on:
  pull_request:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # splitway-gui (eframe/egui, glow renderer) links a windowing/GL stack on
      # Linux; install the dev libraries so clippy/test/build compile it. macOS
      # uses system frameworks (Cocoa/Metal) and needs none. rfd uses the XDG
      # desktop portal (pure-Rust zbus), so no GTK dev package is required.
      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libgl1-mesa-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  nix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Flake check
        run: nix flake check --print-build-logs

      - name: Build
        run: nix build --print-build-logs

  scrub-guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Guards against committing real infrastructure data (real resolver IPs /
      # internal domains from pasted resolvectl/nmcli/scutil output). See the
      # "Redaction" section in CLAUDE.md.
      - name: Check for leaked infrastructure data
        run: bash scripts/check-no-leaked-infra.sh
