name: CI

on:
  pull_request:
  push:
    branches: [dev]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Fail loudly if Cargo.lock has drifted from the manifests (e.g. a member
      # version bumped without relocking). --locked makes cargo refuse to update
      # the lock, so a stale lock errors here instead of surfacing later as a
      # `cargo fetch --locked` abort in the packaging build-arch/build-gui jobs.
      #
      # Resolving touches the registry index on a cold runner, so a transient
      # crates.io blip (SSL eof, HTTP2 reset) could flake this check. Retry those,
      # but fail FAST on a genuine drift (the `--locked` error), which no retry
      # can fix.
      - name: Verify Cargo.lock is in sync with the manifests
        env:
          CARGO_NET_RETRY: "10"
          CARGO_HTTP_MULTIPLEXING: "false"
        run: |
          tmp_err="$(mktemp)"
          for i in 1 2 3; do
            if cargo metadata --format-version 1 --locked >/dev/null 2>"$tmp_err"; then
              rm -f "$tmp_err"; exit 0
            fi
            cat "$tmp_err" >&2
            # A genuine drift (the `--locked` refusal) no retry can fix — fail fast.
            if grep -q -- '--locked' "$tmp_err"; then
              echo "ERROR: Cargo.lock is out of sync with the manifests — relock (e.g. cargo update -p splitway-daemon) and commit Cargo.lock"
              exit 1
            fi
            echo "cargo metadata failed (attempt $i/3) — likely a transient registry error; retrying in ${i}0s" >&2
            sleep "${i}0"
          done
          echo "ERROR: cargo metadata --locked still failing after retries (registry unreachable?)"
          exit 1

      # splitway-gui (eframe/egui, glow renderer) links a windowing/GL stack on
      # Linux; install the dev libraries so clippy/test/build compile it. macOS
      # uses system frameworks (Cocoa/Metal) and needs none. rfd uses the XDG
      # desktop portal (pure-Rust zbus), so no GTK dev package is required.
      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev libgl1-mesa-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  nix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Flake check
        run: nix flake check --print-build-logs

      - name: Build
        run: nix build --print-build-logs

  scrub-guard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # Guards against committing real infrastructure data (real resolver IPs /
      # internal domains from pasted resolvectl/nmcli/scutil output). See the
      # "Redaction" section in CLAUDE.md.
      - name: Check for leaked infrastructure data
        run: bash scripts/check-no-leaked-infra.sh
