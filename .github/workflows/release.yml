name: Build release daemon

on:
  push:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-amd64
            bin_ext: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: meta
        shell: bash
        run: |
          # awk (not `grep | head -1`): SIGPIPE-free version read under pipefail.
          VERSION=$(awk -F'"' '/^version/{print $2; exit}' splitway-daemon/Cargo.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross == true }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: ${{ matrix.use_cross == true }}
        run: cross build --release -p splitway-daemon --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ matrix.use_cross != true }}
        run: cargo build --release -p splitway-daemon --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/splitway-daemon${{ matrix.bin_ext }}"
          dst="splitway-daemon-${{ matrix.suffix }}${{ matrix.bin_ext }}"
          cp "$src" "$dst"

      - uses: actions/upload-artifact@v6
        with:
          name: splitway-daemon-${{ matrix.suffix }}
          path: splitway-daemon-${{ matrix.suffix }}${{ matrix.bin_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        shell: bash
        run: |
          # awk (not `grep | head -1`): SIGPIPE-free version read under pipefail.
          VERSION=$(awk -F'"' '/^version/{print $2; exit}' splitway-daemon/Cargo.toml)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          files: artifacts/*
          fail_on_unmatched_files: true

  bump-version:
    needs: release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Pin AUR PKGBUILD pkgver to the just-released version
        shell: bash
        # MUST run before the daemon bump below: while Cargo.toml still holds the
        # version we just tagged, sync-pkgver.sh stamps it into every PKGBUILD so
        # `makepkg -si` fetches the `v$pkgver` tag / assets that now exist. The
        # bump then moves the daemon ahead for the next dev cycle, leaving the
        # PKGBUILDs deliberately one release behind (check-pkgver-sync.sh
        # validates the pinned tag exists, not that it equals the daemon).
        run: bash packaging/ci/sync-pkgver.sh

      # cargo update (below) needs a toolchain; this job otherwise only runs bash.
      - uses: dtolnay/rust-toolchain@stable

      - name: Bump patch version in Cargo.toml for the next dev cycle
        shell: bash
        run: |
          # awk (not `grep | head -1`): SIGPIPE-free version read under pipefail.
          VERSION=$(awk -F'"' '/^version/{print $2; exit}' splitway-daemon/Cargo.toml)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "s/^version = \"$VERSION\"/version = \"$NEW_VERSION\"/" splitway-daemon/Cargo.toml
          # Keep Cargo.lock in lockstep with the bumped member version. Without
          # this, master is left with toml=NEW but lock=OLD, and the next
          # dev->master merge tree inherits that drift — so `cargo fetch --locked`
          # / `cargo build --frozen` abort in the packaging build-arch/build-gui
          # jobs. --precise rewrites only splitway-daemon's lock entry.
          cargo update -p splitway-daemon --precise "$NEW_VERSION"
          echo "Bumped $VERSION -> $NEW_VERSION (Cargo.toml + Cargo.lock)"

      - name: Commit and push the AUR pin + version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add splitway-daemon/Cargo.toml Cargo.lock packaging/aur/*/PKGBUILD
          # [skip ci]: this bot commit must never re-trigger release/packaging.
          # A GITHUB_TOKEN push already does not start new workflow runs, but the
          # marker makes that intent explicit (and holds if the push is ever moved
          # to a PAT), so the next-cycle bump can never publish an unreleased
          # version to the stable apt/dnf/pacman channels.
          git commit -m "chore: pin AUR pkgver to release, bump daemon for next cycle [skip ci]"
          git push

  # After the post-release bump lands on master, dev is one bump behind. Open
  # (or refresh) a PR that merges master back into dev so dev tracks the next dev
  # cycle automatically — a PR rather than a direct push, because dev follows the
  # branch -> PR workflow and may be protected. Best-effort auto-merge makes it
  # hands-off where the repo allows it (no required checks); otherwise the PR just
  # waits for a one-click merge. NOTE: this PR is opened by GITHUB_TOKEN, so it
  # does NOT trigger pull_request CI on itself (GitHub suppresses that) — required
  # checks would block auto-merge; use a PAT here if you want them to run.
  sync-dev:
    needs: bump-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Open/refresh a PR syncing the post-release bump into dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --quiet origin master dev
          # Nothing to sync if dev already contains master's tip.
          if git merge-base --is-ancestor origin/master origin/dev; then
            echo "dev already contains master — no sync PR needed"; exit 0
          fi
          # awk (not `grep | head -1`): SIGPIPE-free version read under pipefail.
          VERSION=$(git show origin/master:splitway-daemon/Cargo.toml \
            | awk -F'"' '/^version/{print $2; exit}')
          num=$(gh pr list --base dev --head master --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            echo "sync PR #$num already open; the master push refreshed it"
          else
            url=$(gh pr create --base dev --head master \
              --title "chore: sync post-release bump into dev (next cycle ${VERSION})" \
              --body "Automated by release.yml after the release was tagged. Brings master's post-release auto-bump — splitway-daemon → ${VERSION}, regenerated Cargo.lock, AUR pkgver pins — back into \`dev\` so dev tracks the next dev cycle." \
              ) || { echo "could not open sync PR (resolve manually): merge origin/master into dev"; exit 0; }
            num=$(printf '%s' "$url" | sed -n 's#.*/pull/\([0-9][0-9]*\).*#\1#p')
            echo "opened sync PR #${num} ($url)"
          fi
          # Best-effort: land it automatically once mergeable. No-op (PR waits for
          # manual merge) if the repo lacks auto-merge or has required checks.
          [ -n "$num" ] && { gh pr merge --auto --merge "$num" \
            || echo "auto-merge unavailable; sync PR #${num} left for manual merge"; }
