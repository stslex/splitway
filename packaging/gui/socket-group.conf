# Splitway socket-group opt-in drop-in.
#
# Shipped by the splitway-gui package to /usr/share/splitway/socket-group.conf
# and copied by its postinst into
#   /etc/systemd/system/splitway.service.d/socket-group.conf
# (removed again by its postrm). It switches the daemon's control socket to
# group mode — 0660 root:splitway, runtime dir 0750 — so an in-group user can
# drive the daemon without sudo (the unprivileged-GUI deployment). Mirrors the
# commented opt-in block in packaging/systemd/splitway.service and the ExecStart
# built by nix/module.nix.
#
# EMPTY-GROUP INVARIANT: the package creates an EMPTY `splitway` group. With no
# members this drop-in is a NO-OP — the posture is identical to the default
# 0600 root-only socket. The ONLY way to grant access is a human running
# `usermod -aG splitway <user>` and re-logging in; the maintainer scripts never
# add a user. Group membership is equivalent to control of system split-DNS.
[Service]
# The bare ExecStart= clears the unit's default command so the next line
# replaces (not appends to) it.
ExecStart=
ExecStart=/usr/bin/splitway-daemon run --config /var/lib/splitway/config.json --socket-group splitway
RuntimeDirectoryMode=0750
SupplementaryGroups=splitway
